      - name: Prepare Pages artifact
        run: |
          mkdir -p ./_site
          # core pages
          cp -r index.html 404.html robots.txt sitemap.xml ./_site/
          # css and js
          cp -r dist ./_site/dist
          mkdir -p ./_site/src
          cp -r src/app.js ./_site/src/
          # root assets (copy whatever exists, ignore if not present)
          cp -f CNAME ./_site/ 2>/dev/null || true
          for ext in jpg jpeg png svg webp ico gif; do
            cp -f *.$ext ./_site/ 2>/dev/null || true
          done
