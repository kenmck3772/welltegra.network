<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Well‑Tegra v21 • Fixed Logo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="theme-dark bg-slate-900 text-slate-100">
  <div id="welcome-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50">
    <div class="text-center">
      <img src="./assets/logo.svg" onerror="this.src='https://placehold.co/128x128/0f172a/ffffff?text=WT'"
           alt="Well‑Tegra Logo" class="h-24 w-auto mx-auto mb-6 animate-pulse">
      <div class="bg-slate-800 p-8 rounded-lg shadow-2xl w-80">
        <h2 class="text-2xl font-bold text-white mb-6">Platform Login</h2>
        <div class="space-y-4">
          <input type="text" placeholder="Username" value="demo@welltegra.com" class="w-full p-3 rounded-md bg-slate-700 border border-slate-600" />
          <input type="password" placeholder="Password" value="password" class="w-full p-3 rounded-md bg-slate-700 border border-slate-600" />
        </div>
        <a href="index.full.html" class="mt-6 block w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-3 px-4 rounded-md text-center">Enter Demo</a>
        <a href="videos.html" class="mt-3 block w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-md text-center">Videos</a>
      </div>
    </div>
  </div>
</body>
</html>
