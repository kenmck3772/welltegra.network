<!DOCTYPE html>
<html lang='en' class='scroll-smooth'>
<head>
<meta charset='UTF-8' />
<meta name='viewport' content='width=device-width, initial-scale=1.0' />
<title>Well-Tegra | Local Preview (v2)</title>
<script src='https://cdn.tailwindcss.com'></script>
<script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
<link rel='stylesheet' href='./assets/styles.css'>
<style>body{font-family:Arial,sans-serif;font-weight:500}.theme-dark{background:#0f172a;color:#e2e8f0}#main-content::before{content:"";position:absolute;inset:0;z-index:-1;pointer-events:none;background-image:url('./assets/watermark.jpg');background-repeat:repeat;background-position:center;background-size:350px;opacity:.03}.header{background:#0f172a;border-bottom:1px solid #1e293b}.light-card{background:#1e293b;border:1px solid #334155}</style>
</head>
<body class='theme-dark'>
<header class='header sticky top-0 z-30'><div class='max-w-7xl mx-auto py-3 px-4 sm:px-6 lg:px-8'><div class='flex items-center justify-between'><div class='flex items-center'><img src='./assets/logo.svg' class='h-10 w-auto mr-3' alt='Logo'><h1 class='text-lg md:text-xl font-bold'>Well-Tegra Data Solutions</h1></div><nav class='hidden md:flex items-center gap-6 text-slate-300'><a href='https://www.youtube.com/@WellTegra' target='_blank' class='hover:text-white'>YouTube</a></nav></div></div></header>
<main id='main-content' class='relative flex-1'>
<section class='relative py-20 px-4 overflow-hidden'><img src='./assets/hero-poster.svg' class='absolute inset-0 w-full h-full object-cover opacity-40 -z-10'><div class='max-w-4xl mx-auto text-center relative z-10'><h2 class='text-4xl md:text-6xl font-extrabold tracking-tight text-white'>From Data Chaos to Predictive Clarity.</h2><p class='mt-6 text-lg md:text-xl text-slate-100'>Reduce NPT, reclaim engineering time, and unify your fragmented data.</p><div class='mt-8'><a href='https://www.youtube.com/@WellTegra' target='_blank' class='inline-flex items-center gap-2 rounded-md bg-teal-600 px-6 py-3 font-semibold text-white hover:bg-teal-500'>Visit the Channel</a></div></div></section>
<section class='py-16 px-4'><div class='max-w-6xl mx-auto grid lg:grid-cols-2 gap-10 items-center'><div class='light-card p-6 rounded-lg'><h3 class='text-xl font-bold mb-4'>Quick ROI Calculator</h3><div class='space-y-5'><div><label for='engineerCount' class='font-semibold'>Well Engineers</label><input type='range' id='engineerCount' min='5' max='100' value='20' class='w-full'><div class='text-right text-sm'>Value: <span id='engineerCountValue' class='font-bold'>20</span></div></div><div><label for='nptReduction' class='font-semibold'>NPT Reduction (%)</label><input type='range' id='nptReduction' min='5' max='40' value='20' class='w-full'><div class='text-right text-sm'>Value: <span id='nptReductionValue' class='font-bold'>20%</span></div></div><div><label for='timeSavings' class='font-semibold'>Time Reclaimed (%)</label><input type='range' id='timeSavings' min='10' max='50' value='40' class='w-full'><div class='text-right text-sm'>Value: <span id='timeSavingsValue' class='font-bold'>40%</span></div></div></div><div class='mt-6 pt-4 border-t border-slate-700 text-center'><p class='text-base font-semibold'>Total Estimated Annual Savings</p><p id='totalSavings' class='text-4xl font-extrabold text-teal-400 mt-2'>$0</p></div></div><div class='relative w-full max-w-xl mx-auto h-[320px]'><canvas id='savingsChart'></canvas></div></div></section>
</main>
<footer class='py-10 px-4 border-t border-slate-800'><div class='max-w-6xl mx-auto flex items-center justify-between text-sm text-slate-400'><span>© Well-Tegra</span><a href='https://www.youtube.com/@WellTegra' target='_blank' class='brand'>YouTube: @WellTegra</a></div></footer>
<script>const engineerCountSlider=document.getElementById('engineerCount'),nptReductionSlider=document.getElementById('nptReduction'),timeSavingsSlider=document.getElementById('timeSavings'),engineerCountValue=document.getElementById('engineerCountValue'),nptReductionValue=document.getElementById('nptReductionValue'),timeSavingsValue=document.getElementById('timeSavingsValue'),totalSavingsValue=document.getElementById('totalSavings'),savingsChartCanvas=document.getElementById('savingsChart');function calculateROI(){const e=parseInt(engineerCountSlider.value),n=parseInt(nptReductionSlider.value)/100,t=parseInt(timeSavingsSlider.value)/100,a=120000,o=250000,d=15,i=e*a*t,s=o*d*n,c=i+s;engineerCountValue.textContent=e,nptReductionValue.textContent=100*n+'%',timeSavingsValue.textContent=100*t+'%',totalSavingsValue.textContent='$'+Math.round(c).toLocaleString(),window.savingsChart&&(window.savingsChart.data.datasets[0].data=[i,s],window.savingsChart.update())}function initChart(){const e=savingsChartCanvas.getContext('2d');window.savingsChart=new Chart(e,{type:'bar',data:{labels:['Engineering Time','NPT Reduction'],datasets:[{label:'Annual Savings',data:[0,0],backgroundColor:['#0d9488','#0891b2'],borderRadius:4}]},options:{responsive:!0,maintainAspectRatio:!1,indexAxis:'y',plugins:{legend:{display:!1}},scales:{x:{ticks:{callback:e=>'$'+(e/1e3).toLocaleString()+'k',color:'#cbd5e1'},grid:{color:'rgba(255,255,255,0.1)'}},y:{ticks:{color:'#cbd5e1'},grid:{display:!1}}}}})}engineerCountSlider.addEventListener('input',calculateROI),nptReductionSlider.addEventListener('input',calculateROI),timeSavingsSlider.addEventListener('input',calculateROI),initChart(),calculateROI();</script>
</body>
</html>
