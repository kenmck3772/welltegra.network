<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Well-Tegra • Max Build v2</title>
  <link rel="stylesheet" href="./assets/tailwind.css">
  <script>
    (function(){
      var probe=document.createElement('div');probe.className='hidden';document.head.appendChild(probe);
      var ok=getComputedStyle(probe).display==='none';probe.remove();
      if(!ok){
        var s=document.createElement('script');s.src='https://cdn.tailwindcss.com';document.head.appendChild(s);
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
  <header class="max-w-6xl mx-auto px-4 py-6 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <img src="./assets/logo.svg" class="h-10 w-10" alt="Well-Tegra logo">
      <h1 class="text-xl font-extrabold">Well-Tegra — Max Build</h1>
    </div>
    <nav class="flex gap-3 text-sm">
      <a class="hover:underline" href="videos.html">Videos</a>
      <a class="hover:underline" href="README.html">Readme</a>
    </nav>
  </header>
  <main class="max-w-6xl mx-auto px-4 pb-16">
    <div class="rounded-2xl p-6 bg-slate-800/40 ring-1 ring-slate-700">
      <p class="text-lg">Your full app HTML can replace this page. Keep the local Tailwind link above.</p>
      <ol class="list-decimal ml-6 mt-4 space-y-2">
        <li>Run <code>npm install</code></li>
        <li>Run <code>npm run build:css</code></li>
        <li>Open <code>index.html</code></li>
      </ol>
    </div>
  </main>
</body>
</html>
