<html lang="en" class="scroll-smooth">
<head>

  <title>WellTegra – From Data Chaos to Predictive Clarity</title>

  <meta name="description" content="WellTegra unifies planning, execution, and analysis for well operations. Reduce NPT, reclaim engineering time, and align partners with a single source of truth." />
  <meta name="theme-color" content="#0B0B0B" />
  <link rel="canonical" href="https://welltegra.network/">
  <meta name="color-scheme" content="light dark">
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- CSP: allows YouTube + Google platform.js -->
  <meta http-equiv="Content-Security-Policy"
        content="
          default-src 'self';
          img-src 'self' data: https://i.ytimg.com https://img.youtube.com https://www.youtube.com;
          style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
          font-src 'self' https://fonts.gstatic.com;
          script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://plausible.io https://apis.google.com https://www.youtube.com https://www.gstatic.com;
          frame-src https://www.youtube-nocookie.com https://www.youtube.com;
          connect-src 'self' https://plausible.io;
        ">

  <!-- Open Graph -->
  <meta property="og:title" content="WellTegra – From Data Chaos to Predictive Clarity" />
  <meta property="og:description" content="Unify planning → execution → analysis. Reduce NPT, reclaim engineering time, align partners." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://welltegra.network/" />
  <meta property="og:image" content="og.jpg" />
  <meta property="og:image:alt" content="WellTegra: From data chaos to predictive clarity" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="og.jpg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Favicons -->
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">

  <!-- Tailwind build -->
  <link rel="stylesheet" href="dist/output.css">

  <!-- Analytics (optional) -->
  <script defer data-domain="welltegra.network" src="https://plausible.io/js/script.js"></script>

  <!-- Inline helpers & lite-youtube styles -->
  <style>
    :root { color-scheme: light; --wt-accent: 14,165,233; --wt-axis: 11,11,11; --wt-grid: 229,231,235; }
    .dark:root { --wt-axis: 248,250,252; --wt-grid: 55,65,81; }
    html, body { height: 100%; }
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    :focus-visible { outline: 2px solid #0EA5E9; outline-offset: 2px; border-radius: .5rem; }
    input[type=range] { accent-color: #0EA5E9; }
    .chart-container { position: relative; width: 100%; max-width: 640px; margin: 0 auto; }
    .chart-container > canvas { height: 420px !important; }
    .active-scroll { font-weight: 600; color: #0EA5E9 !important; opacity: 1 !important; }
    .roi-input-container:focus-within { border-color: #0EA5E9 !important; box-shadow: 0 0 0 1px #0EA5E9; }
    .reveal { opacity: 0; transform: translateY(14px); transition: opacity .5s ease, transform .5s ease; }
    .revealed { opacity: 1; transform: none; }
    @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; transition: none; } }
    .sticky-cta { position: fixed; left: 0; right: 0; bottom: 0; z-index: 60; backdrop-filter: blur(8px); }
    [id] { scroll-margin-top: 72px; }

    /* Lite YouTube */
    .lite-yt { position:relative; display:block; background:#000; border-radius:0.75rem; overflow:hidden; cursor:pointer; }
    .lite-yt::before { content:""; display:block; padding-top:56.25%; }
    .lite-yt > .thumb, .lite-yt > iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
    .lite-yt > .thumb { background-position:center; background-size:cover; filter:brightness(.9); transition:filter .2s ease; }
    .lite-yt:hover > .thumb { filter:brightness(1); }
    .lite-yt > .playbtn {
      position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
      width:68px; height:48px; background:rgba(0,0,0,.6); border-radius:10px; display:grid; place-items:center;
    }
    .lite-yt > .playbtn svg { width:28px; height:28px; fill:#fff; }
  </style>
</head>
