    <style>
        :root {
            --clan-gold: #d4af37;
            --clan-burgundy: #800020;
            --clan-forest: #2d5016;
            --clan-stone: #8b7355;
            --parchment: #f4f1e8;
            --aged-paper: #f0ead6;
        }
        
        /* Light Mode Default */
        body { font-family: 'Inter', sans-serif; background: var(--parchment); color: #374151; }
        .font-title { font-family: 'Cinzel', serif; }

        /* Dark Mode Styles */
        html.dark body { background: #111827; color: #d1d5db; }
        html.dark .content-card, html.dark .bg-white\/80, html.dark .bg-white\/90, html.dark .bg-white { background: rgba(31, 41, 55, 0.9); }
        html.dark .bg-stone-100, html.dark .bg-stone-50 { background: #374151; }
        html.dark .text-stone-800, html.dark .text-gray-900, html.dark .text-stone-900 { color: #e5e7eb; }
        html.dark .text-stone-600, html.dark .text-gray-600, html.dark .text-gray-700, html.dark .text-stone-500 { color: #9ca3af; }
        html.dark .text-yellow-800 { color: var(--clan-gold); }
        html.dark .border-stone-200, html.dark .border-gray-200, html.dark .border-gray-300 { border-color: #4b5563; }
        html.dark .header-bg { background: rgba(17, 24, 39, 0.8); }
        html.dark .leaflet-tile { filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7); }
        html.dark .dropdown-menu { background: rgba(31, 41, 55, 0.95); }
        html.dark .mobile-menu-bg { background: rgba(31, 41, 55, 0.95); }
        html.dark .spiritual-journey { background: #1f2937; }
        html.dark .element-card { background: #374151; }
        html.dark .ritual-step h4, html.dark .ritual-step p, html.dark .tree li a { color: #d1d5db; }
        html.dark .tree li a { background-color: #374151; border-color: #6b7280;}

        .nav-link.active { color: var(--clan-gold); border-bottom: 2px solid var(--clan-gold); background: rgba(212, 175, 55, 0.1); }
        html.dark .nav-link.active { background: rgba(212, 175, 55, 0.2); }
        
        .page-section { display: none; }
        .page-section.active { display: block; }
        
        .btn-primary { background: linear-gradient(45deg, var(--clan-burgundy), var(--clan-forest)); color: white; border: 2px solid var(--clan-gold); transition: all 0.3s ease; }
        .btn-primary:hover { background: linear-gradient(45deg, var(--clan-forest), var(--clan-burgundy)); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
        
        .dropdown .dropdown-menu { display: none; }
        .dropdown:hover .dropdown-menu { display: block; }

        .tab-button.active { border-color: var(--clan-gold); color: var(--clan-gold); font-weight: 600; background-color: var(--aged-paper); }
        html.dark .tab-button.active { background-color: #374151; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        #clanMap, #tourismMap { min-height: 60vh; border-radius: 0.5rem; }

        /* Slideshow Styles */
        .slide { display: none; animation: fade 1.5s ease-in-out; background-size: cover; background-position: center; }
        .slide.active { display: block; }
        @keyframes fade { from { opacity: .4 } to { opacity: 1 } }
        
        /* Spiritual Journey Styles */
        .spiritual-journey { background: linear-gradient(135deg, #fef9e7 0%, #fdf2e9 100%); }
        .mystical-stone { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .mystical-stone:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15); }
        .stone-selected { transform: scale(1.15) !important; box-shadow: 0 0 20px rgba(161, 98, 7, 0.5) !important; border: 3px solid #a16207; }
        .element-card { transition: transform 0.2s ease, box-shadow 0.2s ease; border: 2px solid transparent; }
        .element-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1); }
        .element-card.selected { border-color: #a16207; background: #fef9e7; }
        html.dark .element-card.selected { background: #4b5563; }
        .mystical-glow { animation: mysticalGlow 3s ease-in-out infinite alternate; }
        @keyframes mysticalGlow { from { box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); } to { box-shadow: 0 0 25px rgba(212, 175, 55, 0.6); } }
        
        /* Family Tree Styles */
        .tree ul { padding-top: 20px; position: relative; transition: all 0.5s; display: flex; justify-content: center;}
        .tree li { float: left; text-align: center; list-style-type: none; position: relative; padding: 20px 5px 0 5px; transition: all 0.5s; }
        .tree li::before, .tree li::after{ content: ''; position: absolute; top: 0; right: 50%; border-top: 2px solid var(--clan-stone); width: 50%; height: 20px; }
        .tree li::after{ right: auto; left: 50%; border-left: 2px solid var(--clan-stone); }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child{ padding-top: 0;}
        .tree li:first-child::before, .tree li:last-child::after{ border: 0 none; }
        .tree li:last-child::before{ border-right: 2px solid var(--clan-stone); border-radius: 0 5px 0 0; }
        .tree li:first-child::after{ border-radius: 5px 0 0 0; }
        .tree ul ul::before{ content: ''; position: absolute; top: 0; left: 50%; border-left: 2px solid var(--clan-stone); width: 0; height: 20px; }
        .tree li a{ border: 2px solid var(--clan-stone); padding: 10px; text-decoration: none; color: #333; background-color: var(--parchment); font-family: 'Cinzel', serif; display: inline-block; border-radius: 5px; transition: all 0.5s; min-width: 100px; }
        .tree li a.selected { border-color: var(--clan-gold); box-shadow: 0 0 10px var(--clan-gold); }

</head>

                { id: "stewart", name: "Clan Stewart", motto: "Virescit Vulnere Virtus", lore: "The Royal House of Scotland.", seat: { lat: 56.123, lng: -3.948 }, emblems: { traditional: `${githubBaseUrl}emblems/traditional/stewart-emblem.jpg`, modern: `${githubBaseUrl}emblems/modern/stewart-emblem.jpg`, celtic: `${githubBaseUrl}emblems/celtic/stewart-emblem.jpg` }, tartan: { image: `${githubBaseUrl}tartans/stewart.jpg`} },
                { id: "wallace", name: "Clan Wallace", motto: "Pro Libertate", lore: "The clan of Scotland's national hero.", seat: { lat: 55.883, lng: -4.433 }, emblems: { traditional: `${githubBaseUrl}emblems/traditional/wallace-emblem.jpg`, modern: `${githubBaseUrl}emblems/modern/wallace-emblem.jpg`, celtic: `${githubBaseUrl}emblems/celtic/wallace-emblem.jpg` }, tartan: { image: `${githubBaseUrl}tartans/wallace.jpg`} }
            ];
            
            const slideData = [
                 { "img": "https://images.unsplash.com/photo-1534274988757-a28bf1a57c17?q=80&w=1935", "title": "Highland Lochs", "desc": "Mirror-like waters reflecting majestic mountains" },
                { "img": "https://images.unsplash.com/photo-1506373295124-73a729b47031?q=80&w=1932", "title": "Lakeside Castles", "desc": "Medieval fortresses nestled in pristine landscapes" },
                { "img": "https://images.unsplash.com/photo-1547772635-e6de7417042a?q=80&w=1974", "title": "Glacial Valleys", "desc": "Carved by ancient ice, bathed in sunlight" },
                { "img": "https://images.unsplash.com/photo-1552522432-043c7d3c33d8?q=80&w=1935", "title": "Historic Landmarks", "desc": "Ancient monuments standing guard over the waters" }
            ];
            
            // --- ALL TEMPLATE AND FEATURE FUNCTIONS ARE NOW DEFINED ---

            function getHomePageHTML() {
                 let slides = slideData.map((slide, index) => `
                    <div class="slide ${index === 0 ? 'active' : ''} absolute inset-0" style="background-image:url('${slide.img}')">
                        <div class="absolute inset-0 bg-black/50"></div>
                        <div class="relative h-full flex items-center justify-center text-center p-8">
                            <div>
                                <h2 class="text-5xl md:text-7xl font-bold font-title text-white drop-shadow-lg">${slide.title}</h2>
                                <p class="text-xl md:text-2xl mt-4 italic text-white/90 drop-shadow-md">${slide.desc}</p>
                            </div>
                        </div>
                    </div>`).join('');
                let dots = slideData.map((_, index) => `<span class="dot cursor-pointer h-3 w-3 mx-1 bg-white/50 rounded-full inline-block transition-colors duration-600 ease-in-out ${index === 0 ? 'active' : ''}" data-slide="${index}"></span>`).join('');
                return `<div class="relative h-[70vh] min-h-[400px] text-white shadow-2xl overflow-hidden -mt-8">${slides}<div class="absolute bottom-5 z-30 w-full flex justify-center">${dots}</div></div>`;
            }

            function getClansPageHTML() { 
                return `<div class="content-card flex flex-col md:flex-row min-h-screen rounded-2xl shadow-xl overflow-hidden">
                    <aside class="w-full md:w-64 lg:w-72 bg-stone-100 p-4 flex flex-col">
                        <h2 class="text-xl font-bold text-stone-800 font-title mb-4">Scottish Clans</h2>
                        <div id="clan-sidebar-list" class="flex-grow overflow-y-auto"></div>
                    </aside>
                    <main id="clans-main-content" class="flex-1 p-4 sm:p-6 lg:p-8">
                         <div class="text-stone-500 text-center py-20">Select a clan from the list to begin your journey.</div>
                    </main>
                </div>`;
            }
            function getGenealogyPageHTML() { return `<div class="content-card p-8 rounded-xl">Genealogy Tree Builder Coming Soon</div>`; }
            function getTourismPageHTML() { return `<div class="content-card p-8 rounded-xl">Trip Planner Coming Soon</div>`; }
            function getNameGeneratorPageHTML() { return `<div class="content-card p-8 rounded-xl">Name Generator Coming Soon</div>`; }
            function getSagaPageHTML() { return `<div class="content-card p-8 rounded-xl">Highland Saga Coming Soon</div>`; }
            function getGuidesPageHTML() { return `<div class="content-card p-8 rounded-xl">Heritage Guides coming soon.</div>`; }
            function get3DPageHTML() { return `<div class="content-card p-8 rounded-xl">3D Heritage Explorer Coming Soon</div>`; }
            function getFinderPageHTML() { return `<div class="content-card p-8 rounded-xl">Clan Finder Coming Soon</div>`; }
            function getLegendsPageHTML() { return `<div class="content-card p-8 rounded-xl">Legends Coming Soon</div>`; }
            function getTartanDesignerPageHTML() { return `<div class="content-card p-8 rounded-xl">Tartan Designer Coming Soon</div>`; }
            function getRecipesPageHTML() { return `<div class="content-card p-8 rounded-xl">Recipes Coming Soon</div>`; }
            function getAIAssistantPageHTML() { return `<div class="content-card p-8 rounded-xl">Och-I Assistant Coming Soon</div>`; }

            function initNav() {
                const navLinks = document.querySelectorAll('.nav-link');
                const pageSections = document.querySelectorAll('.page-section');
                const mobileMenuBtn = document.getElementById('mobile-menu-btn');
                const mobileMenu = document.getElementById('mobile-menu');

                navLinks.forEach(link => {
                    link.addEventListener('click', () => {
                        const targetId = link.dataset.target;
                        
                        if(targetId === 'home') {
                            mainContent.className = '';
                        } else {
                            mainContent.className = 'max-w-7xl mx-auto px-4 py-8';
                        }

                        pageSections.forEach(section => section.classList.toggle('active', section.id === `${targetId}-section`));
                        navLinks.forEach(nav => nav.classList.remove('active'));
                        document.querySelectorAll(`.nav-link[data-target="${targetId}"]`).forEach(l => l.classList.add('active'));
                        
                        if (targetId === 'clans' && !maps.clans) initClansMap();
                        
                        setTimeout(() => {
                           if (targetId === 'clans' && maps.clans) maps.clans.invalidateSize();
                        }, 10);

                        mobileMenu.classList.add('hidden');
                    });
                });
                mobileMenuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
            }

            function setupDarkMode() {
                const toggle = document.getElementById('dark-mode-toggle');
                const icon = toggle.querySelector('i');
                const htmlEl = document.documentElement;

                if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    htmlEl.classList.add('dark');
                    icon.className = 'fas fa-sun';
                } else {
                    htmlEl.classList.remove('dark');
                    icon.className = 'fas fa-moon';
                }

                toggle.addEventListener('click', () => {
                    if (htmlEl.classList.toggle('dark')) {
                        localStorage.theme = 'dark';
                        icon.className = 'fas fa-sun';
                    } else {
                        localStorage.theme = 'light';
                        icon.className = 'fas fa-moon';
                    }
                });
            }

            function initClansMap() { 
                if (maps.clans) return;
                const clansMain = document.getElementById('clans-main-content');
                if(!clansMain) return;
                
                clansMain.innerHTML = `<div id="clanMap" class="w-full h-full rounded-lg shadow-lg"></div>`;
                maps.clans = L.map('clanMap').setView([57.0, -4.5], 7);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(maps.clans);
                
                const sidebar = document.getElementById('clan-sidebar-list');
                sidebar.innerHTML = clanData.map(clan => `<button class="block w-full text-left px-4 py-2 rounded-md hover:bg-stone-200" data-clan-id="${clan.id}">${clan.name}</button>`).join('');
                sidebar.addEventListener('click', e => {
                    const button = e.target.closest('[data-clan-id]');
                    if (button) {
                        showClanDetails(button.dataset.clanId);
                        document.querySelectorAll('#clan-sidebar-list button').forEach(btn => btn.classList.remove('active-item'));
                        button.classList.add('active-item');
                    }
                });
            }

            function showClanDetails(clanId) { 
                const clan = clanData.find(c => c.id === clanId);
                const mainContent = document.getElementById('clans-main-content');
                mainContent.innerHTML = `
                    <div class="animate-fade-in grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2">
                             <div id="clanMap" class="w-full h-96 lg:h-full rounded-lg shadow-lg"></div>
                        </div>
                        <div id="clan-dossier" class="lg:col-span-1">
                            <h3 class="text-3xl font-bold font-title">${clan.name}</h3>
                            <p class="font-semibold text-stone-600 italic mb-4">${clan.motto}</p>
                            <div class="mt-4 border-b border-stone-200">
                                <nav class="-mb-px flex space-x-2" aria-label="Tabs">
                                    <button class="tab-button whitespace-nowrap py-2 px-1 border-b-2 font-medium text-sm active" data-tab="lore">Lore</button>
                                    <button class="tab-button whitespace-nowrap py-2 px-1 border-b-2 font-medium text-sm" data-tab="emblems">Emblems</button>
                                    <button class="tab-button whitespace-nowrap py-2 px-1 border-b-2 font-medium text-sm" data-tab="tartan">Tartan</button>
                                </nav>
                            </div>
                            <div class="mt-4">
                                <div id="lore-tab" class="tab-content active space-y-2 text-sm">${clan.lore || 'Details coming soon.'}</div>
                                <div id="emblems-tab" class="tab-content">
                                    <div class="grid grid-cols-3 gap-2">
                                        <div><img src="${clan.emblems.traditional}" alt="Traditional Emblem" class="w-full rounded-md"><p class="text-xs text-center mt-1">Traditional</p></div>
                                        <div><img src="${clan.emblems.modern}" alt="Modern Emblem" class="w-full rounded-md"><p class="text-xs text-center mt-1">Modern</p></div>
                                        <div><img src="${clan.emblems.celtic}" alt="Celtic Emblem" class="w-full rounded-md"><p class="text-xs text-center mt-1">Celtic</p></div>
                                    </div>
                                </div>
                                <div id="tartan-tab" class="tab-content">
                                    <img src="${clan.tartan.image}" alt="${clan.name} Tartan" class="w-full rounded-md mb-2">
                                    <p class="text-sm">${clan.tartan.description || ''}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                mainContent.querySelectorAll('.tab-button').forEach(button => {
                    button.addEventListener('click', (e) => {
                        const tabId = e.currentTarget.dataset.tab;
                        mainContent.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
                        mainContent.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                        e.currentTarget.classList.add('active');
                        mainContent.querySelector(`#${tabId}-tab`).classList.add('active');
                    });
                });
                
                maps.clans = L.map('clanMap').setView([clan.seat.lat, clan.seat.lng], 9);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(maps.clans);
                L.marker([clan.seat.lat, clan.seat.lng]).addTo(maps.clans);
            }
            
            function setupSlideshow() { 
                let slideIndex = 0;
                const slides = document.querySelectorAll(".slide");
                const dots = document.querySelectorAll(".dot");
                if (slides.length === 0) return;

                function showSlides() {
                    slides.forEach(s => s.classList.remove('active'));
                    dots.forEach(d => d.classList.remove('active'));
                    slideIndex++;
                    if (slideIndex > slides.length) {slideIndex = 1}    
                    slides[slideIndex-1].classList.add('active');
                    dots[slideIndex-1].classList.add('active');
                    setTimeout(showSlides, 5000); 
                }
                showSlides();
            }

            function initAllFeatures() {
                Object.keys(pages).forEach(pageKey => {
                    const pageElement = document.getElementById(`${pageKey}-section`);
                    const templateFunc = window[`get${pageKey.charAt(0).toUpperCase() + pageKey.slice(1).replace(/-/g, '')}PageHTML`];
                    if (templateFunc) {
                        pageElement.innerHTML = templateFunc();
                    }
                });
                if(document.querySelector('.slide')) setupSlideshow();
            }
            
            window.getHomePageHTML = getHomePageHTML;
            window.getClansPageHTML = getClansPageHTML;
            window.getGenealogyPageHTML = getGenealogyPageHTML;
            window.getTourismPageHTML = getTourismPageHTML;
            window.getNameGeneratorPageHTML = getNameGeneratorPageHTML;
            window.getSagaPageHTML = getSagaPageHTML;
            window.getGuidesPageHTML = getGuidesPageHTML;
            window.get3DPageHTML = get3DPageHTML;
            window.getFinderPageHTML = getFinderPageHTML;
            window.getLegendsPageHTML = getLegendsPageHTML;
            window.getTartanDesignerPageHTML = getTartanDesignerPageHTML;
            window.getRecipesPageHTML = getRecipesPageHTML;
            window.getAIAssistantPageHTML = getAIAssistantPageHTML;
            
            initNav();
            initAllFeatures();
            setupDarkMode();
            
            document.querySelector('.nav-link[data-target="home"]').click();
        });
    </script>
</body>
</html>
