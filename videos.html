<!doctype html><html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Videos · WellTegra</title>
<link rel="icon" href="/favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/styles.css">
</head><body>
<div class="container">
<div class="nav">
  <div class="brand">WellTegra</div>
  <div style="display:flex;gap:12px">
    <a href="./index.html">Home</a>
    <a href="./dashboards.html">Dashboards</a>
    <a href="./videos.html">Videos</a>
    <a href="./docs.html">Docs</a>
  </div>
</div>

<div class="card">
  <h1>Video Gallery</h1>
  <p class="muted">Reads <code>data/videos.json</code> and renders a responsive grid of embeds. If a video fails to embed, open directly on YouTube.</p>
</div>
<div id="vgrid" class="grid cols-3"></div>
<script>
async function loadV(){
  let vids=[];
  try{
    vids = await (await fetch('./data/videos.json?cache='+Date.now())).json();
  }catch(e){ console.error(e); }
  const root = document.getElementById('vgrid');
  root.innerHTML = vids.map(v=>`
    <div class="card">
      <div style="position:relative;padding-top:56.25%;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.08)">
        <iframe style="position:absolute;inset:0;width:100%;height:100%" src="https://www.youtube.com/embed/${v.id}" title="${v.title||'Video'}" frameborder="0" allowfullscreen></iframe>
      </div>
      <h2 style="font-size:16px">${v.title||'Untitled'}</h2>
      <small class="muted"><a href="https://youtu.be/${v.id}" target="_blank" rel="noopener">Open on YouTube</a></small>
    </div>`).join('');
}
loadV();
</script>
<footer class="muted">© WellTegra · Static demo bundle (v22+)</footer>
</div></body></html>
