
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WellTegra v23</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{ --ink:#0f172a; --sky:#0ea5e9; --sea:#0369a1; --mint:#14b8a6; }
    body{ font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans"; }
    .brand-gradient{ background: radial-gradient(80% 120% at 20% 10%, rgba(14,165,233,.25), transparent 50%), linear-gradient(120deg, rgba(20,184,166,.12), transparent 60%); }
    .hero-overlay{ background: linear-gradient(to bottom, rgba(15,23,42,.65), rgba(15,23,42,.4)); }
    .wm:before{ content:""; position:absolute; inset:0; background-image:url('assets/watermark.jpg'); background-size:400px; opacity:.03; pointer-events:none; }
    .btn{ display:inline-flex; align-items:center; gap:.5rem; padding:.5rem 1rem; border-radius:.75rem; background:#0284c7; color:#fff; text-decoration:none; }
    .btn:hover{ background:#0ea5e9; }
    .link{ color:#0284c7; text-decoration:none; }
    .link:hover{ color:#0ea5e9; }
  </style>
</head>
<body class="bg-white text-slate-800">
  <header class="sticky top-0 z-30 bg-white/90 backdrop-blur border-b">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <img src="assets/logo.jpg" alt="WellTegra logo" class="h-10 w-auto rounded-sm" onerror="this.style.display='none'">
        <span class="font-extrabold tracking-tight">WellTegra</span>
      </a>
      <nav class="hidden md:flex items-center gap-6 text-sm font-semibold">
        <a class="hover:text-sky-600" href="planner.html">Planner</a>
        <a class="hover:text-sky-600" href="performer.html">Performer</a>
        <a class="hover:text-sky-600" href="analyzer.html">Analyzer</a>
        <a class="hover:text-sky-600" href="videos.html">Videos</a>
        <a class="hover:text-sky-600" href="whitepaper.html">White Paper</a>
        <a class="hover:text-sky-600" href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-12">
    <h1 class="text-3xl font-extrabold">Analyzer</h1>
    <p class="mt-2 text-slate-600">Post‑job summary using your generated plan.</p>

    <div id="grid" class="mt-8 grid md:grid-cols-3 gap-6"></div>

    <div class="mt-10 p-6 rounded-xl ring-1 ring-slate-200">
      <h2 class="font-bold">Lessons Learned</h2>
      <ul id="ll" class="mt-3 list-disc pl-5 text-sm space-y-1"></ul>
      <div class="mt-4 flex items-center gap-2">
        <input id="lesson" class="border rounded-md px-3 py-2 text-sm flex-1" placeholder="Add a lesson…" />
        <button id="add" class="btn">Add</button>
      </div>
    </div>
  </main>
  <script>
    (async () => {
      const { well } = await WT.getWell();
      const plan = localStorage.getItem('wt:plan') ? JSON.parse(localStorage.getItem('wt:plan')) : null;
      const g = document.getElementById('grid');
      if(!well || !plan){ g.innerHTML = '<div class="md:col-span-3 p-6 rounded-lg ring-1 ring-rose-300 bg-rose-50">Please run through Planner/Performer first.</div>'; return; }
      const actualDays = Math.round(plan.days * 1.08 * 10) / 10;
      const actualCost = Math.round(plan.cost * 1.06);
      g.innerHTML = `
        <div class="p-6 rounded-xl ring-1 ring-slate-200"><div class="text-slate-500 text-xs">Well</div><div class="font-extrabold">${well.name || well.id}</div></div>
        <div class="p-6 rounded-xl ring-1 ring-slate-200"><div class="text-slate-500 text-xs">Duration</div><div class="font-extrabold">${plan.days} d → ${actualDays} d</div></div>
        <div class="p-6 rounded-xl ring-1 ring-slate-200"><div class="text-slate-500 text-xs">Cost</div><div class="font-extrabold">$${plan.cost.toLocaleString()} → $${actualCost.toLocaleString()}</div></div>`;

      const key = 'wt:lessons';
      const list = document.getElementById('ll');
      const refresh = () => {
        list.innerHTML = (JSON.parse(localStorage.getItem(key) || '[]')).map(t => `<li>${t}</li>`).join('');
      };
      refresh();
      document.getElementById('add').onclick = () => {
        const t = document.getElementById('lesson').value.trim(); if(!t) return;
        const arr = JSON.parse(localStorage.getItem(key) || '[]'); arr.push(t);
        localStorage.setItem(key, JSON.stringify(arr)); document.getElementById('lesson').value=''; refresh();
      };
    })();
  </script>

  <footer class="mt-20 border-t">
    <div class="max-w-7xl mx-auto px-4 py-10 text-sm text-slate-500 flex flex-wrap items-center justify-between gap-4">
      <p>© 2025 WellTegra Data Solutions</p>
      <div class="flex items-center gap-4">
        <a class="link" href="mailto:info@welltegra.network">info@welltegra.network</a>
        <a class="link" href="https://welltegra.network">welltegra.network</a>
      </div>
    </div>
  </footer>
  <script>
    window.WT = {
      selectWell: (id) => { localStorage.setItem('wt:selectedWell', id); },
      getWell: async () => {
        const resp = await fetch('data/wells.json');
        const data = await resp.json();
        const id = localStorage.getItem('wt:selectedWell');
        const wells = data.wells || data || [];
        return { id, well: wells.find(w => (w.id || w.name) === id) || null, wells };
      }
    };
  </script>
</body>
</html>
