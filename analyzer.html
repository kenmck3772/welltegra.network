<!doctype html><html lang='en'><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width, initial-scale=1'/><title>Analyzer — WellTegra</title><style>:root{--bg:#0f172a;--ink:#e6f3ff;--muted:#bcd3f6;--panel:#0f2036;--accent:#21b5f0}

nav ul{list-style:none;margin:0;padding:0;display:flex;gap:12px;flex-wrap:wrap}
nav a{opacity:.9;padding:8px 10px;border-radius:10px}
nav a:hover,nav a.active{opacity:1;background:rgba(188,211,246,.12)}
.btn{display:inline-flex;align-items:center;gap:8px;border-radius:12px;padding:10px 14px;font-weight:650;cursor:pointer}
.btn.primary{background:linear-gradient(135deg,#2c68b0,var(--accent));color:#07101f}

.container{max-width:1100px;margin:0 auto;padding:28px 20px}
h1{font-size:clamp(28px,3.2vw,44px)} .lead{color:var(--muted)}
.card{background:var(--panel);border:1px solid rgba(188,211,246,.12);border-radius:14px;padding:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

.table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid rgba(188,211,246,.16);border-radius:12px;overflow:hidden}
.table th,.table td{padding:10px;border-bottom:1px solid rgba(188,211,246,.12);text-align:left}
.table th{background:#0b1c30}

footer{border-top:1px solid rgba(188,211,246,.1);padding:18px 20px;color:var(--muted)}

@media (max-width:900px){.grid-3{grid-template-columns:1fr 1fr}.grid-2{grid-template-columns:1fr}}</style></head><body><header><div class="nav">

<h1>Analyzer</h1>
<p class="lead">Quick KPIs from your demo plan & deviations. (Front-end only.)</p>
<div class="grid-3">
  <div class="card"><h3>KPIs</h3><table class="table">
    <tr><th>Deviation count</th><td id="k_devs">0</td></tr>
    <tr><th>Top deviation type</th><td id="k_top">—</td></tr>
    <tr><th>Estimated NPT days saved</th><td id="k_npt">0.0</td></tr>
  </table></div>
  <div class="card"><h3>Repeat issues</h3><ul id="issues"></ul><canvas id="issueChart" width="420" height="240" style="margin-top:10px;background:#0b1c30;border-radius:8px"></canvas></div>
  <div class="card"><h3>ROI snapshot</h3><p id="roi">—</p></div>
</div>
<script>
function getDev(){try{return JSON.parse(localStorage.getItem('WT_DEV')||'[]')}catch(e){return []}}
function drawChart(types){const cv=document.getElementById('issueChart');if(!cv)return;const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);const keys=Object.keys(types);const vals=keys.map(k=>types[k]);const max=Math.max(1,...vals);const pad=30;const barW=(cv.width-pad*2)/Math.max(1,keys.length);ctx.fillStyle='#21b5f0';ctx.strokeStyle='rgba(230,243,255,.4)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad,pad/2);ctx.lineTo(pad,cv.height-pad);ctx.lineTo(cv.width-pad/2,cv.height-pad);ctx.stroke();vals.forEach((v,i)=>{const h=(v/max)*(cv.height-pad*1.6);const x=pad+i*barW+8;const y=(cv.height-pad)-h;ctx.fillRect(x,y,barW-16,h);ctx.fillText(keys[i],x,cv.height-pad+14);ctx.fillText(String(v),x,y-6);});}
function analyze(){const dev=getDev();document.getElementById('k_devs').textContent=dev.length;const types={};dev.forEach(d=>{types[d.type]=(types[d.type]||0)+1});let top='—',max=0;for(const k in types){if(types[k]>max){max=types[k];top=k}};document.getElementById('k_top').textContent=top;const nptSaved=(dev.filter(d=>d.type==='NPT').length*0.2).toFixed(1);document.getElementById('k_npt').textContent=nptSaved;const issuesEl=document.getElementById('issues');issuesEl.innerHTML='';Object.keys(types).sort((a,b)=>types[b]-types[a]).forEach(k=>{const li=document.createElement('li');li.textContent=k+' × '+types[k];issuesEl.appendChild(li);});const wells=10,costPerDay=250000,baselineNPT=3,reduction=0.2,rework=15000;const nptSavings=wells*costPerDay*baselineNPT*reduction;const reworkSavings=wells*rework;const total=nptSavings+reworkSavings;document.getElementById('roi').textContent='Illustrative: '+total.toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0});drawChart(types);} analyze();
</script>
