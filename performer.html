<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Performer • Well-Tegra</title>
  <meta name="description" content="Capture structured events during operations with zero lock-in." />
  <link rel="icon" href="assets/favicon.png" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./assets/tailwind.css?v=3" />
</head>
<body class="bg-white text-slate-900">
  <header class="border-b bg-white/80 backdrop-blur sticky top-0 z-40">
    <div class="mx-auto max-w-7xl px-6 h-16 flex items-center justify-between">
      <a href="./index.html" class="font-extrabold text-xl">Well-Tegra</a>
      <nav class="hidden md:flex gap-6 text-sm">
        <a href="./planner.html" class="hover:text-sky-600">Planner</a>
        <a href="./performer.html" class="text-sky-600 font-semibold">Performer</a>
        <a href="./analyzer.html" class="hover:text-sky-600">Analyzer</a>
        <a href="./videos.html" class="hover:text-sky-600">Videos</a>
        <a href="./whitepaper.html" class="hover:text-sky-600">White Paper</a>
      </nav>
      <div></div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-6 py-10">
    <h1 class="text-3xl font-extrabold">Performer</h1>
    <p class="mt-2 text-slate-600">Log events quickly; export JSON/CSV for any system.</p>

    <section class="mt-8 grid gap-6 md:grid-cols-3">
      <form class="md:col-span-2 rounded-2xl border border-slate-200 p-6 shadow-sm">
        <h2 class="text-lg font-semibold">Log Event</h2>
        <div class="grid md:grid-cols-2 gap-4 mt-4">
          <label class="text-sm">Timestamp
            <input class="mt-1 w-full rounded-lg border px-3 py-2" type="datetime-local" />
          </label>
          <label class="text-sm">Category
            <select class="mt-1 w-full rounded-lg border px-3 py-2">
              <option>Pressure</option><option>Toolstring</option><option>Circulation</option><option>Other</option>
            </select>
          </label>
          <label class="md:col-span-2 text-sm">Details
            <textarea class="mt-1 w-full rounded-lg border px-3 py-2 h-28" placeholder="What happened?"></textarea>
          </label>
        </div>
        <div class="mt-4 flex gap-3">
          <button type="button" class="rounded-xl bg-sky-600 text-white px-4 py-2">Add</button>
          <button type="button" class="rounded-xl border px-4 py-2">Export CSV</button>
        </div>
      </form>

      <aside class="rounded-2xl border border-slate-200 p-6 shadow-sm">
        <h3 class="text-sm font-semibold text-slate-700">Recent</h3>
        <ul class="mt-3 space-y-2 text-sm">
          <li class="flex justify-between"><span>10:14 Pressure 1,950 psi</span><span class="text-slate-400">OK</span></li>
          <li class="flex justify-between"><span>10:27 Circulation loss</span><span class="text-amber-500">Watch</span></li>
          <li class="flex justify-between"><span>10:41 Overpull 25k</span><span class="text-red-500">Alert</span></li>
        </ul>
      </aside>
    </section>
  </main>

  <footer class="border-t">
    <div class="mx-auto max-w-7xl px-6 py-8 text-sm text-slate-500">© Well-Tegra</div>
  </footer>
</body>
</html>
