<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Performer — WellTegra</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <script defer src="js/main.js"></script>
</head>
<body>

<nav>
  <div class="inner">
    <div class="brand">WellTegra</div>
    <a href="index.html">Home</a>
    <a href="analyzer.html">Analyzer</a>
    <a href="planner.html">Planner</a>
    <a href="performer.html">Performer</a>
    <a href="videos.html">Videos</a>
    <span class="spacer"></span>
    <a href="whitepaper.html">Whitepaper</a>
  </div>
</nav>

<div class="container">
  <div class="card">
    <h2 style="margin-top:0">Performer — Shift Log</h2>
    <p>Quick checklist for field ops. Stored locally in your browser.</p>
    <div class="grid grid-2">
      <label>Well<select id="pl-well"></select></label>
      <label>Condition<select id="pl-cond"><option>Normal</option><option>Watch</option><option>Alert</option></select></label>
      <label>Notes<textarea id="pl-notes" style="width:100%;height:120px"></textarea></label>
    </div>
    <button id="pl-save" class="btn" style="margin-top:10px">Save Entry</button>
  </div>
  <div class="card" style="margin-top:16px">
    <h3>Last 10 Entries</h3>
    <div id="pl-rows"></div>
  </div>
</div>
<script>
const key='wt_performer';
function load(){ try{return JSON.parse(localStorage.getItem(key)||'[]')}catch(e){return[]} }
function save(items){ localStorage.setItem(key, JSON.stringify(items)); }
(async()=>{
  const d=await getJSON('data/wells.json'); const wells=d.wells||[];
  const sel=document.getElementById('pl-well');
  wells.forEach(w=>{ const o=document.createElement('option'); o.value=w.well_id||w.name; o.textContent=w.name||w.well_id; sel.appendChild(o); });
  document.getElementById('pl-save').onclick=()=>{
    const items=load();
    items.unshift({ts:Date.now(),well:sel.value,cond:qs('#pl-cond').value,notes:qs('#pl-notes').value});
    save(items.slice(0,50));
    redraw();
    qs('#pl-notes').value='';
  };
  redraw();
})();
function redraw(){
  const rows=load().slice(0,10);
  const wrap=document.getElementById('pl-rows');
  wrap.innerHTML='';
  rows.forEach(r=>{
    const div=document.createElement('div');
    div.className='card'; div.style.margin='8px 0';
    const when=new Date(r.ts).toLocaleString();
    div.innerHTML='<div class="mono">'+(r.well||'—')+' • '+(r.cond||'—')+' • '+when+'</div><div>'+ (r.notes||'') +'</div>';
    wrap.appendChild(div);
  });
}
</script>
</body>
</html>
