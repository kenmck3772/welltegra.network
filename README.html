<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>README — Well-Tegra Max Build</title>
<link rel="stylesheet" href="./assets/tailwind.css">
<script>(function(){var p=document.createElement('div');p.className='hidden';document.head.appendChild(p);

</head>
<body class="bg-slate-900 text-slate-100">
<main class="max-w-3xl mx-auto px-4 py-10">
  <h1 class="text-3xl font-extrabold mb-4">Well-Tegra — Max Build v2</h1>
  <ol class="list-decimal ml-6 space-y-2">
    <li>Run <code>npm install</code></li>
    <li>Build CSS: <code>npm run build:css</code></li>
    <li>Open <code>index.html</code></li>
  </ol>
  <p class="mt-4">Swap in your full app HTML and keep the local Tailwind link in <code>&lt;head&gt;</code>.</p>
</main>
</body></html>
