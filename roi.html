<!DOCTYPE html>
<html lang="en">
<head><title>ROI Calculator — WellTegra</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="description" content="WellTegra: integrated Planner • Performer • Analyzer for well interventions. Visual alpha."/>
  <link rel="icon" href="/assets/welltegra-logo.svg" type="image/svg+xml">
  <meta property="og:title" content="WellTegra — Planner • Performer • Analyzer"/>
  <meta property="og:image" content="https://welltegra.network/assets/hero.jpg"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 antialiased">

<header class="sticky top-0 bg-slate-950/80 backdrop-blur border-b border-white/10 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
    <img src="/assets/welltegra-logo.svg" class="h-8 w-auto" alt="WellTegra"/>
    <nav class="ml-auto flex flex-wrap gap-5 text-sm">
      <a href="/" class="hover:underline">Home</a>
      <a href="/planner.html" class="hover:underline">Planner</a>
      <a href="/performer.html" class="hover:underline">Performer</a>
      <a href="/analyzer.html" class="hover:underline">Analyzer</a>
      <a href="/process.html" class="hover:underline">Process</a>
      <a href="/compare.html" class="hover:underline">Compare</a>
      <a href="/roi.html" class="hover:underline">ROI</a>
      <a href="/privacy.html" class="hover:underline">Privacy</a>
      <a href="/visuals.html" class="hover:underline">Visuals</a>
    </nav>
  </div>
</header>

<main class="max-w-3xl mx-auto px-4 py-12">
  <h1 class="text-3xl md:text-4xl font-bold">ROI (illustrative)</h1>
  <p class="text-slate-300 mt-2">Back-of-napkin calculator. Replace with your numbers.</p>
  <div class="mt-6 grid md:grid-cols-2 gap-4">
    <label class="block text-sm">Jobs per year<input id="jobs" type="number" value="50" class="mt-1 w-full bg-slate-900 border border-white/10 rounded p-2"/></label>
    <label class="block text-sm">Avg. job cost (USD)<input id="jobcost" type="number" value="250000" class="mt-1 w-full bg-slate-900 border border-white/10 rounded p-2"/></label>
    <label class="block text-sm">Baseline NPT (%)<input id="npt" type="number" value="12" class="mt-1 w-full bg-slate-900 border border-white/10 rounded p-2"/></label>
    <label class="block text-sm">NPT reduction with WellTegra (%)<input id="reduct" type="number" value="20" class="mt-1 w-full bg-slate-900 border border-white/10 rounded p-2"/></label>
  </div>
  <button onclick="calc()" class="mt-4 px-4 py-2 rounded border border-emerald-400/40 bg-emerald-400/10 hover:bg-emerald-400/20">Calculate</button>
  <div id="out" class="mt-6 text-lg font-semibold"></div>
</main>

<footer class="mt-20 border-t border-white/10">
  <div class="max-w-7xl mx-auto px-4 py-8 text-sm text-slate-300 flex flex-col sm:flex-row items-center justify-between gap-4">
    <div>© WellTegra — Visual alpha</div>
    <div>Contact:
      <a class="underline" href="mailto:info@welltegra.network">info@welltegra.network</a> ·
      <a class="underline" href="mailto:kenmckenzie@welltegra.network">kenmckenzie@welltegra.network</a>
    </div>
  </div>
</footer>

<script>
function calc(){
  const jobs = +document.getElementById('jobs').value||0;
  const jobcost = +document.getElementById('jobcost').value||0;
  const npt = (+document.getElementById('npt').value||0)/100;
  const reduct = (+document.getElementById('reduct').value||0)/100;
  const baselineNPTCost = jobs*jobcost*npt;
  const saved = baselineNPTCost*reduct;
  document.getElementById('out').textContent = 'Estimated annual savings: $' + saved.toLocaleString();
}
</script>
</body></html>
