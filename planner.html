
<h1>Planner</h1>
<p class="lead">Spotlight modal load fallback.</p>
<div class="card">
  <p><a class="btn ghost" id="viewWell">View well</a></p>
</div>
<div class="modal-backdrop" id="wtModal" style="display:none">
  <div class="modal">
    <header><strong id="wtTitle">Well</strong><a id="wtClose" class="btn ghost">Close</a></header>
    <div id="wtBody" style="padding:14px"></div>
  </div>
</div>

<script>
if (typeof renderWellSchematicMinimal !== 'function'){
  function renderWellSchematicMinimal(well){
    const width=600, height=420, pad=40;
    const casing = (well.completion && well.completion.casing) || [];
    const perfs = (well.completion && well.completion.perforations) || [];
    const maxDepth = Math.max(
      well.target_md_ft||well.depth||0,
      ...casing.map(c=>+c.depth_ft||0),
      ...perfs.map(p=>+p.depth_ft||0),
      1000
    );
    const y = (d)=> pad + (d/maxDepth)*(height - pad*2);
    let svg = `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" role="img" aria-label="Well schematic">`;
    svg += `<path d="M ${pad} ${pad} L ${pad} ${height-pad}" stroke="rgba(188,211,246,.6)" />`;
    for(let ft=0; ft<=maxDepth; ft+=Math.max(500, Math.round(maxDepth/6/100)*100)){
      const yy = y(ft);
      svg += `<text x="${pad-8}" y="${yy+4}" fill="#bcd3f6" font-size="10" text-anchor="end">${ft} ft</text>`;
      svg += `<path d="M ${pad} ${yy} L ${width-pad} ${yy}" stroke="rgba(188,211,246,.1)" />`;
    }
    const cx = (i)=> pad + 80 + i*22;
    casing.forEach((c,i)=>{
      const d = +c.depth_ft || (maxDepth*0.7);
      svg += `<rect x="${cx(i)}" y="${pad}" width="14" height="${y(d)-pad}" fill="#154177" stroke="#21b5f0"/>`;
      svg += `<text x="${cx(i)+7}" y="${pad-8}" fill="#cfe8ff" font-size="10" text-anchor="middle">${c.size || c.od || ''}</text>`;
    });
    perfs.forEach((p,idx)=>{
      const d = +p.depth_ft || (maxDepth*0.6);
      const yy = y(d);
      svg += `<circle cx="${width - pad - 40 - (idx%5)*16}" cy="${yy}" r="4" fill="#21b5f0"/>`;
    });
    svg += `<path d="M ${width/2} ${pad} L ${width/2} ${height-pad}" stroke="#21b5f0" stroke-width="2"/>`;
    svg += `</svg>`;
    return svg;
  }
}
function comma(n){return (n==null || isNaN(n)?'—':Number(n).toLocaleString());}
function last(arr){return (arr && arr.length)?arr[arr.length-1]:null;}
function byDateDesc(a,b){return (new Date(b.date||b.ts||0))-(new Date(a.date||a.ts||0));}
function buildSpotlightShell(){
  return `
  <div class="wt-modal-grid">
    <div class="wt-card">
      <h3 style="margin-top:0">Wellbore Schematic</h3>
      <div id="wt-schematic" class="wt-skeleton" style="min-height:420px;border-radius:10px"></div>
      <div class="wt-section">
        <span class="wt-pill">Interactive</span>
        <span class="wt-pill">Depth scale</span>
        <span class="wt-pill">Casing & perfs</span>
      </div>
    </div>
    <div>
      <div class="wt-card">
        <h3 style="margin-top:0">Highlights</h3>
        <div class="wt-metrics" id="wt-metrics"></div>
        <div class="wt-highlight">
          <div>
            <h4 style="margin:.6rem 0 .2rem">Casing strings</h4>
            <div id="wt-casing"></div>
          </div>
          <div>
            <h4 style="margin:.6rem 0 .2rem">Completion</h4>
            <div id="wt-completion"></div>
          </div>
        </div>
      </div>
      <div class="wt-card wt-section">
        <h3 style="margin-top:0">Recent Reports</h3>
        <ul class="wt-reports" id="wt-reports"></ul>
        <p style="margin:8px 0 0"><a href="#" id="wt-more" class="wt-link">See more reports</a></p>
      </div>
    </div>
  </div>`;
}
function renderSpotlight(well){
  const body = document.getElementById('wtBody');
  body.innerHTML = buildSpotlightShell();
  document.getElementById('wtTitle').textContent = well.name || well.id || 'Well';
  const sc = document.getElementById('wt-schematic');
  sc.classList.remove('wt-skeleton');
  sc.innerHTML = (typeof renderWellSchematic === 'function')? renderWellSchematic(well) : renderWellSchematicMinimal(well);
  const perfCount = (well.completion && well.completion.perforations || []).length;
  const casingCount = (well.completion && well.completion.casing || []).length;
  const lastHist = last((well.history||[]).slice().sort(byDateDesc));
  const metrics = [
    {lbl:'Target MD (ft)', val: comma(well.target_md_ft || well.depth)},
    {lbl:'TVD (ft)',       val: comma(well.tvd_ft)},
    {lbl:'Casing strings', val: comma(casingCount)},
    {lbl:'Perforations',   val: comma(perfCount)},
    {lbl:'Last activity',  val: lastHist? new Date(lastHist.date).toLocaleDateString(): '—'},
  ];
  document.getElementById('wt-metrics').innerHTML =
    metrics.map(m=>`<div class="wt-metric"><div class="num">${m.val}</div><div class="lbl">${m.lbl}</div></div>`).join('');
  const casing = (well.completion && well.completion.casing || []).map(c=>
    `<span class="wt-pill">${(c.size||c.od||'?')} ${(c.depth_ft? '• '+comma(c.depth_ft)+' ft':'')}</span>`
  ).join('') || '<span class="wt-pill">No casing data</span>';
  document.getElementById('wt-casing').innerHTML = casing;
  const completion = (well.completion && well.completion.equipment || []).map(e=>
    `<span class="wt-pill">${e.name || e.type}</span>`
  ).join('') || '<span class="wt-pill">No equipment data</span>';
  document.getElementById('wt-completion').innerHTML = completion;
  const reports = (well.dailyReports || []).slice().sort(byDateDesc);
  const first = reports.slice(0,3);
  const list = (items)=> items.map(r=>`
    <li>
      <div><strong>${r.title || r.type || 'Report'}</strong><br><small>${r.summary || ''}</small></div>
      <div style="text-align:right"><time>${r.date? new Date(r.date).toLocaleDateString(): '—'}</time></div>
    </li>`).join('');
  const el = document.getElementById('wt-reports');
  el.innerHTML = first.length ? list(first) : '<li><em>No reports available</em></li>';
  const more = document.getElementById('wt-more');
  more.style.display = reports.length>3 ? 'inline' : 'none';
  more.onclick = (e)=>{ e.preventDefault(); el.innerHTML = list(reports); more.style.display='none'; };
}
document.addEventListener('click',(e)=>{
  if(e.target && e.target.id==='viewWell'){
    e.preventDefault();
    if(!window.WT_WELLS || !WT_WELLS.length){ alert('Load wells first'); return; }
    const id = document.getElementById('wellPicker') ? document.getElementById('wellPicker').value : (WT_WELLS[0]?.id);
    const well = WT_WELLS.find(x=>String(x.id)===String(id)) || WT_WELLS[0];
    renderSpotlight(well);
    document.getElementById('wtModal').style.display='flex';
  }
  if(e.target && e.target.id==='wtClose'){
    document.getElementById('wtModal').style.display='none';
  }
});
</script>
