<!doctype html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/>
<title>Planner — WellTegra</title><style>body{margin:0;font:16px system-ui;background:#0f172a;color:#e6f3ff}
.container{max-width:1100px;margin:0 auto;padding:20px}
.card{background:#0f2036;border:1px solid rgba(188,211,246,.12);border-radius:14px;padding:16px}
label{display:block;margin:6px 0 4px}</style></head><body>
<main class='container'><div class='card'><h1>Planner</h1><p>Using <code>data/wells.json</code></p>
<label>Well</label><select id='well'></select>
<p style='margin-top:10px'><a id='load' href='#'>Load</a></p>
<div id='out' style='margin-top:10px'></div></div></main>
<script>
async function init(){const r=await fetch('data/wells.json');const j=await r.json();const wells=j.wells||[];const sel=document.getElementById('well');sel.innerHTML=wells.map(w=>`<option value='${w.id}'>${w.name} (${w.id})</option>`).join('');document.getElementById('load').onclick=(e)=>{e.preventDefault();const id=sel.value;const w=wells.find(x=>x.id==id);document.getElementById('out').textContent=JSON.stringify(w,null,2);};}
init();
</script></body></html>
